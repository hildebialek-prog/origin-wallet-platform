    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo/logo.jpg" />

    <meta property="og:title" content="Origin Wallet — Ví điện tử dựa trên nền tảng, gốc rễ, bền vững" />
    <meta property="og:description" content="Ví điện tử dựa trên nền tảng, gốc rễ, bền vững. Di chuyển và quản lý tiền toàn cầu với phí thấp, tỷ giá thực." />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Google Translate Styles - Lighter version to allow widget to work -->
    <style>
      /* Hide Google Translate banner and UI elements - but NOT the combo box */
      .goog-te-banner-frame,
      .goog-te-flot,
      .goog-te-button-frame,
      .goog-te-menu-frame,
      .goog-te-balloon-frame,
      .goog-te-banner,
      .goog-te-status {
        display: none !important;
      }
      
      /* Hide gadget wrapper but keep combo accessible */
      .goog-te-gadget {
        display: inline-block;
        font-size: 0 !important;
      }
      
      /* Container - hidden visually but functional */
      #google_translate_element {
        position: absolute;
        top: -1000px;
        left: -1000px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
      
      /* Body reset for translation */
      body {
        position: relative;
      }
      
      html.goog-translate body,
      html.goog-translate {
        margin-top: 0 !important;
      }
      
      /* Hide iframes */
      iframe[src*="translate.google"] {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <!-- Google Translate Widget Container -->
    <div id="google_translate_element"></div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Google Translate Script -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        console.log('🔄 Google Translate Element Init called');
        new google.translate.TranslateElement({
          pageLanguage: 'vi',
          includedLanguages: 'en,vi,zh-CN,ja',
          layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
          autoDisplay: false,
          floatPosition: google.translate.TranslateElement.FloatPosition.TOP_LEFT
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
