<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="author" content="KHOI NGUYEN TECHNOLOGY JSC" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo/logo.jpg" />

    <meta property="og:title" content="Origin Wallet — Ví điện tử dựa trên nền tảng, gốc rễ, bền vững" />
    <meta property="og:description" content="Ví điện tử dựa trên nền tảng, gốc rễ, bền vững. Di chuyển và quản lý tiền toàn cầu với phí thấp, tỷ giá thực." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo/knt-logo.svg" />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Google Translate Styles -->
    <style>
      /* Hide ALL Google Translate elements completely */
      .goog-te-banner-frame,
      .goog-te-flot,
      .goog-te-button-frame,
      .goog-te-menu-frame,
      .goog-te-balloon-frame,
      .goog-te-gadget,
      .goog-te-gadget-simple,
      .goog-te-banner,
      .goog-te-status,
      .skiptranslate {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        width: 0 !important;
        position: absolute !important;
        top: -9999px !important;
        left: -9999px !important;
        overflow: hidden !important;
      }
      
      /* Body reset */
      body {
        position: relative !important;
        top: 0 !important;
        margin-top: 0 !important;
      }
      
      /* Google Translate container - hidden but functional */
      #google_translate_element {
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
        width: 1px !important;
        height: 1px !important;
        overflow: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        visibility: hidden !important;
      }
      
      /* Make sure combo box is accessible but hidden */
      .goog-te-combo {
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
      
      /* Remove any translate related iframes */
      iframe[src*="translate.google"],
      iframe[src*="translate.googlecom"] {
        display: none !important;
        height: 0 !important;
        width: 0 !important;
        position: absolute !important;
        top: -9999px !important;
      }
      
      /* Hide loading indicator */
      .goog-te-loading {
        display: none !important;
      }
      
      /* Ensure content is not pushed down */
      html, body, #root {
        margin: 0 !important;
        padding: 0 !important;
        top: 0 !important;
      }
    </style>
  </head>

  <body>
    <!-- Google Translate Widget Container - Must be visible for widget to work -->
    <div id="google_translate_element">
      <script type="text/javascript">
        function googleTranslateElementInit() {
          new google.translate.TranslateElement({
            pageLanguage: 'vi',
            includedLanguages: 'en,vi,zh-CN,ja',
            layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
            autoDisplay: false
          }, 'google_translate_element');
        }
      </script>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Load Google Translate script -->
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
